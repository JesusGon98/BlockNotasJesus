services:
  db:
    image: postgres:16

    container_name: postgres_db

    restart: always

    environment:
      POSTGRES_DB: tasksdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: django_api

    command: >
      sh -c "
      uv run python manage.py migrate &&
      uv run python manage.py runserver 0.0.0.0:8000
      "

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    environment:
      POSTGRES_DB: tasksdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432

    depends_on:
      - db

volumes:
  postgres_data: